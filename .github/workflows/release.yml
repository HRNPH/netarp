name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag version (e.g. v1.0.1). Leave empty to use Cargo.toml version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            binary: netarp-x86_64-linux-gnu
          - target: x86_64-unknown-linux-musl
            binary: netarp-x86_64-linux-musl
          - target: aarch64-unknown-linux-musl
            binary: netarp-aarch64-linux-musl
          - target: armv7-unknown-linux-musleabihf
            binary: netarp-armv7-linux-musleabihf

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.14.0"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/netarp target/${{ matrix.binary }}

      - name: Determine version tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep '^version' Cargo.toml | head -1 | awk -F'"' '{print $2}')
            echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: target/${{ matrix.binary }}
          generate_release_notes: true
