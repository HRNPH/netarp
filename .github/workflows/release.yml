name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag version (e.g. v0.2.0). Leave empty to use Cargo.toml version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-gnu/release/netarp

      - name: Determine version tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep '^version' Cargo.toml | head -1 | awk -F'"' '{print $2}')
            echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: target/x86_64-unknown-linux-gnu/release/netarp
          generate_release_notes: true
